    <h1>Polimorfismo</h1>

    <p>
        Capacidade de objetos de diferentes classes derivadas de uma mesma superclasse responderem a uma mesma mensagem (método) de formas diferentes. Permite que um método declarado na superclasse seja reescrito (override) nas subclasses, alterando seu comportamento específico.
